<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ToDo App</title>

<!-- Bootstrap SIN integrity (esto elimina el error del CDN) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>
<body class="container mt-5">

<h1 class="mb-4">Task Manager</h1>

<!-- CREATE TASK -->
<div class="card p-3 mb-4">
  <h4>Add Task</h4>
  <form id="task-form">
      <input id="task-title" class="form-control mb-2" placeholder="Task title" required>

      <select id="task-priority" class="form-select mb-2">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
      </select>

      <button class="btn btn-primary">Add Task</button>
  </form>
</div>

<!-- EDIT TASK -->
<div id="edit-section" style="display:none;" class="card p-3 mb-4">
  <h4>Edit Task</h4>

  <form id="edit-form">
      <input id="edit-title" class="form-control mb-2" required>

      <select id="edit-priority" class="form-select mb-2">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
      </select>

      <div class="form-check mb-3">
          <input id="edit-completed" type="checkbox" class="form-check-input">
          <label class="form-check-label">Completed</label>
      </div>

      <button class="btn btn-success">Save Changes</button>
      <button id="cancel-edit-btn" type="button" class="btn btn-secondary">Cancel</button>
  </form>
</div>

<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="task-list"></tbody>
</table>

<!-- Bootstrap JS SIN integrity -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script src="script.js"></script>
</body>
</html>
