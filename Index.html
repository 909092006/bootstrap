<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="py-5 container">
            <h2>Task Manager</h2>

            <!-- SECCIÓN 1: CREAR NUEVA TAREA -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5>Create New Task</h5>
                </div>
                <div class="card-body">
                    <form id="task-form">
                        <div class="mb-3">
                            <label for="task-title" class="form-label">Task Title:</label>
                            <input id="task-title" class="form-control" type="text" placeholder="Enter task name" required>
                        </div>
                        <div class="mb-3">
                            <label for="task-priority" class="form-label">Priority:</label>
                            <select id="task-priority" class="form-select" required>
                                <option value="">Select Priority</option>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <button id="submit-btn" type="submit" class="btn btn-success">Add Task</button>
                    </form>
                </div>
            </div>

            <!-- SECCIÓN 2: EDITAR TAREA (OCULTA POR DEFECTO) -->
            <div id="edit-section" class="card mb-4" style="display: none; border-left: 4px solid #ff9800;">
                <div class="card-header bg-warning text-dark">
                    <h5>Edit Task</h5>
                </div>
                <div class="card-body">
                    <form id="edit-form">
                        <div class="mb-3">
                            <label for="edit-title" class="form-label">Task Name:</label>
                            <input id="edit-title" class="form-control" type="text" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-priority" class="form-label">Priority:</label>
                            <select id="edit-priority" class="form-select" required>
                                <option value="">Select Priority</option>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="mb-3 form-check">
                            <input id="edit-completed" type="checkbox" class="form-check-input">
                            <label for="edit-completed" class="form-check-label">
                                ✓ Task Completed
                            </label>
                        </div>
                        <button id="save-edit-btn" type="submit" class="btn btn-warning me-2">Save Changes</button>
                        <button id="cancel-edit-btn" type="button" class="btn btn-secondary">Cancel</button>
                    </form>
                </div>
            </div>

            <!-- SECCIÓN 3: LISTA DE TAREAS -->
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5>Your Tasks</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Task</th>
                                    <th>Priority</th>
                                    <th>Is Complete</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="task-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed top-0 end-0 p-3">
            <div id="task-toast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex">
                    <div id="task-toast-message" class="toast-body"></div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
